services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compliance_doc_assistant
    ports:
      - "5432:5432"
    volumes:
      - compliance-doc-assistant-db:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional — only needed if you set GENERATION_PROVIDER=ollama locally instead
  # of using the default Anthropic provider (requires ANTHROPIC_API_KEY).
  # Not started automatically by `docker compose up`; run `docker compose up
  # -d ollama` explicitly, then `docker exec` a `ollama pull <model>` once.
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - compliance-doc-assistant-ollama:/root/.ollama

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      COMPLIANCE_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/compliance_doc_assistant
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-qwen2.5:1.5b}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn --app-dir src --host 0.0.0.0 compliance_doc_assistant.main:app"

volumes:
  compliance-doc-assistant-db:
  compliance-doc-assistant-ollama:
