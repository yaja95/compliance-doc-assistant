databases:
  - name: compliance-doc-assistant-db
    databaseName: compliance_doc_assistant
    user: compliance_doc_assistant
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: compliance-doc-assistant-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: COMPLIANCE_DATABASE_URL
        fromDatabase:
          name: compliance-doc-assistant-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GENERATION_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
